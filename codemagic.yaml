workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build app
        script: |
          xcodebuild \
            -project TcpButtons.xcodeproj \
            -scheme TcpButtons \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath $CM_BUILD_DIR/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ARCHS=arm64 \
            build
      - name: Package IPA
        script: |
          APP_PATH=$(find $CM_BUILD_DIR/build -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          mkdir -p $CM_BUILD_DIR/Payload
          cp -r "$APP_PATH" $CM_BUILD_DIR/Payload/
          cd $CM_BUILD_DIR
          zip -r TcpButtons.ipa Payload/
          ls -lh TcpButtons.ipa
    artifacts:
      - $CM_BUILD_DIR/TcpButtons.ipa
