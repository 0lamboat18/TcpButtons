workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Fix signing settings
        script: |
          cd $CM_BUILD_DIR
          /usr/libexec/PlistBuddy -c "Set :objects:$(xcrun xcodebuild -project TcpButtons.xcodeproj -list 2>/dev/null)" TcpButtons.xcodeproj/project.pbxproj 2>/dev/null || true
      - name: Build app
        script: |
          xcodebuild \
            -project TcpButtons.xcodeproj \
            -scheme TcpButtons \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath $CM_BUILD_DIR/build \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ARCHS=arm64 \
            build 2>&1 | tail -50
      - name: Package IPA
        script: |
          APP_PATH=$(find $CM_BUILD_DIR/build -name "*.app" | head -1)
          echo "App path: $APP_PATH"
          ls -la "$APP_PATH"
          mkdir -p $CM_BUILD_DIR/Payload
          cp -r "$APP_PATH" $CM_BUILD_DIR/Payload/
          cd $CM_BUILD_DIR
          zip -r TcpButtons.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/TcpButtons.ipa
